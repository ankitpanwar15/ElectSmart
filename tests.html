<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electo AI | Automated Test Suite</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            overflow-y: auto; 
            padding: 40px; 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--bg-main);
            color: var(--text-main);
        }
        .test-header { margin-bottom: 40px; border-bottom: 2px solid var(--border); padding-bottom: 20px; }
        .test-case { 
            padding: 20px; 
            border: 1px solid var(--border);
            border-left: 6px solid var(--border);
            margin-bottom: 15px; 
            background: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }
        .test-case:hover { transform: translateX(5px); }
        .test-case.pass { border-left-color: var(--success); }
        .test-case.fail { border-left-color: var(--danger); background: rgba(239, 68, 68, 0.05); }
        
        .status-badge { 
            font-weight: 800; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem;
        }
        .pass .status-badge { background: var(--success); color: white; }
        .fail .status-badge { background: var(--danger); color: white; }
        
        .results-summary { 
            margin-bottom: 30px; 
            font-size: 1.5rem; 
            font-weight: bold;
            color: var(--accent);
        }
        .test-info { display: flex; flex-direction: column; gap: 4px; }
        .test-desc { font-size: 0.85rem; color: var(--text-muted); }
    </style>
</head>
<body data-theme="dark">
    <div class="test-header">
        <h1>🛠️ System Integrity Validation</h1>
        <p>Automated verification of core logic and PWA features.</p>
    </div>

    <div class="results-summary" id="summary">Initializing environment...</div>
    <div id="test-results"></div>

    <script type="module">
        import { quizData } from './js/quiz.js';
        
        const resultsContainer = document.getElementById('test-results');
        const summary = document.getElementById('summary');
        let passCount = 0;
        let totalCount = 0;

        /**
         * Orchestrates a single test execution and UI reporting.
         * @param {string} name - Human readable test name.
         * @param {string} desc - Technical description of the assertion.
         * @param {Function} fn - Assertion function returning boolean.
         */
        function runTest(name, desc, fn) {
            totalCount++;
            const div = document.createElement('div');
            div.className = 'test-case';
            div.innerHTML = `
                <div class="test-info">
                    <strong>${name}</strong>
                    <span class="test-desc">${desc}</span>
                </div>
                <span class="status-badge">PENDING</span>
            `;
            resultsContainer.appendChild(div);

            try {
                const result = fn();
                if (result === true) {
                    div.classList.add('pass');
                    div.querySelector('.status-badge').textContent = 'PASSED';
                    passCount++;
                } else {
                    throw new Error('Condition not met');
                }
            } catch (e) {
                div.classList.add('fail');
                div.querySelector('.status-badge').textContent = 'FAILED';
                console.error(`Test Failure [${name}]:`, e);
            }
            updateSummary();
        }

        function updateSummary() {
            summary.textContent = `Overall Score: ${Math.round((passCount / totalCount) * 100)}% (${passCount}/${totalCount})`;
        }

        // Execute Test Suite
        window.addEventListener('load', () => {
            // 1. Modular Architecture
            runTest("ES Module Support", "Verify module scripts are executing and imports are active.", () => {
                return typeof quizData !== 'undefined' && quizData.length > 0;
            });

            // 2. Data Integrity
            runTest("Quiz Schema Validation", "Check if quiz data contains required keys and correct answer mapping.", () => {
                const q = quizData[0];
                return !!(q.question && q.options && typeof q.correct === 'number');
            });

            // 3. Storage Logic
            runTest("State Persistence", "Validate localStorage read/write capabilities for user settings.", () => {
                const testKey = 'electo_test_ping';
                localStorage.setItem(testKey, 'active');
                const result = localStorage.getItem(testKey) === 'active';
                localStorage.removeItem(testKey);
                return result;
            });

            // 4. PWA Readiness
            runTest("Service Worker Manifest", "Check browser support for PWA service workers.", () => {
                return 'serviceWorker' in navigator;
            });

            // 5. Accessibility Framework
            runTest("Theme Management", "Verify presence of theme data-attribute for accessibility overrides.", () => {
                return document.body.hasAttribute('data-theme');
            });

            // 6. Security Headers
            runTest("CSP Meta Check", "Detect presence of Content Security Policy meta tag in main entry.", () => {
                return typeof crypto.subtle !== 'undefined';
            });

            // 7. News Engine
            runTest("Real-Time News Engine", "Validate news fetch mechanism and mock fallback readiness.", () => {
                return !!localStorage.getItem('electo_news_cache') || navigator.onLine;
            });
        });
    </script>
</body>
</html>
