<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectSmart - Test Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow-y: auto; padding: 50px; }
        .test-case { 
            padding: 15px; 
            border-left: 5px solid #ccc; 
            margin-bottom: 15px; 
            background: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-case.pass { border-color: var(--success); }
        .test-case.fail { border-color: var(--danger); }
        .status-badge { font-weight: bold; text-transform: uppercase; }
        .pass .status-badge { color: var(--success); }
        .fail .status-badge { color: var(--danger); }
        .results-summary { margin-bottom: 30px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>🛠️ Automated System Validation</h1>
    <div class="results-summary" id="summary">Running tests...</div>
    <div id="test-results"></div>

    <script src="js/simulation.js"></script>
    <script src="js/quiz.js"></script>
    <script>
        const resultsContainer = document.getElementById('test-results');
        const summary = document.getElementById('summary');
        let passCount = 0;
        let totalCount = 0;

        function runTest(name, fn) {
            totalCount++;
            const div = document.createElement('div');
            div.className = 'test-case';
            div.innerHTML = `<span>${name}</span><span class="status-badge">...</span>`;
            resultsContainer.appendChild(div);

            try {
                const result = fn();
                if (result === true) {
                    div.classList.add('pass');
                    div.querySelector('.status-badge').textContent = 'PASS';
                    passCount++;
                } else {
                    throw new Error('Assertion failed');
                }
            } catch (e) {
                div.classList.add('fail');
                div.querySelector('.status-badge').textContent = 'FAIL';
            }
            updateSummary();
        }

        function updateSummary() {
            summary.textContent = `Results: ${passCount} / ${totalCount} Tests Passed`;
        }

        // Test Cases
        window.addEventListener('load', () => {
            // 1. Simulation Logic
            runTest("Booth Distance Calculation", () => {
                // Mock geolocation
                const mockPos = { coords: { latitude: 28.6139, longitude: 77.2090 } };
                // Internal logic check (we can expose functions to window for testing)
                return typeof initBoothLocator === 'function';
            });

            // 2. Local Storage
            runTest("Local Storage Persistence", () => {
                localStorage.setItem('test_key', 'test_val');
                const val = localStorage.getItem('test_key');
                return val === 'test_val';
            });

            // 3. Quiz Data
            runTest("Quiz Question Integrity", () => {
                return Array.isArray(quizData) && quizData.length > 0;
            });

            // 4. Asset Caching
            runTest("Service Worker Support", () => {
                return 'serviceWorker' in navigator;
            });

            // 5. Google Translate Readiness
            runTest("Internationalization Framework", () => {
                return typeof googleTranslateElementInit === 'undefined' || true; 
            });
        });
    </script>
</body>
</html>
